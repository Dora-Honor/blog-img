name: Optimize Images

on:
  push:
    paths:
      - 'img/**/*.{jpg,jpeg,png}'

jobs:
  compress:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install WebP
        run: sudo apt-get install webp

      - name: Convert to WebP
        run: |
          find img -type f \( -iname "*.jpg" -o -iname "*.jpeg" -o -iname "*.png" \) | while read file; do
            cwebp -q 90 "$file" -o "${file%.*}.webp"
            rm "$file"
          done

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Auto convert to WebP" || echo "No changes"
          git push https://${PERSONAL_ACCESS_TOKEN}@github.com/Dora-Honor/blog-img.git HEAD:main
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
